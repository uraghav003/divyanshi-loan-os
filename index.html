<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Divyanshi Capital | Digital Loan Services</title>
  <meta name="description" content="Divyanshi Capital - Smart Loan Support for Personal Loan, Business Loan, Home Loan, LAP and Auto Loan. Apply online with Bulbhul AI guidance.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    h1, h2, h3, h4, .logo, .btn { font-family: 'Outfit', sans-serif; }
    :root {
      --blue: #0B1F3A; --blue2: #1a3a6b; --gold: #C9A84C; --gold-hover: #b8932e;
      --orange: #F97316; --bg: #060f1e; --card: #0d1d3a; --muted: #94A3B8;
      --line: #e2e8f0; --green: #10b981; --red: #ef4444; --white: #ffffff;
      --glass: rgba(255,255,255,0.03); --glass-border: rgba(212,175,55,0.2);
    }
    body { background: #f8fafc; color: #0a1628; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    input, select, textarea, button { font-family: inherit; }

    /* ── Layout ── */
    .topbar { background: var(--blue); color: #fff; padding: 10px 5%; font-size: 13px; display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .header { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 16px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 50; }
    .logo { font-size: 24px; font-weight: 900; color: var(--blue); letter-spacing: -0.5px; }
    .nav { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .nav a { font-size: 14px; font-weight: 600; color: #0a1628; transition: color 0.2s ease; }
    .nav a:hover { color: var(--gold); }

    /* ── Buttons ── */
    .btn { background: var(--gold); color: #000; border: 0; border-radius: 10px; padding: 12px 24px; font-weight: 800; font-size: 14px; cursor: pointer; display: inline-block; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 4px 12px rgba(212,175,55,0.2); }
    .btn:hover { background: var(--gold-hover); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(212,175,55,0.3); }
    .btn:disabled { opacity: 0.5; pointer-events: none; transform: none; }
    .btn.orange { background: var(--orange); color: #fff; box-shadow: 0 4px 12px rgba(249,115,22,0.2); }
    .btn.orange:hover { background: #ea580c; box-shadow: 0 6px 18px rgba(249,115,22,0.3); }

    /* ── Banners ── */
    .staff-banner { background: linear-gradient(135deg, var(--gold), #fcd34d); color: #0f172a; padding: 12px 5%; text-align: center; font-weight: 800; font-size: 13px; }

    /* ── Hero ── */
    .hero { background: radial-gradient(circle at top right, var(--blue2), var(--blue)); color: #fff; padding: 80px 5%; display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 50px; align-items: center; }
    .hero h1 { font-size: 48px; line-height: 1.15; margin-bottom: 20px; font-weight: 900; }
    .hero p { font-size: 17px; line-height: 1.7; color: #cbd5e1; margin-bottom: 32px; }
    .hero-card { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(8px); border-radius: 24px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .hero-card h3 { color: var(--gold); font-size: 20px; margin-bottom: 20px; font-weight: 800; }
    .hero-card li { margin: 14px 0; font-size: 15px; list-style: none; display: flex; align-items: center; gap: 10px; color: #e2e8f0; }

    /* ── Sections ── */
    .section { padding: 80px 5%; }
    .title { text-align: center; color: var(--blue); font-size: 36px; font-weight: 800; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 28px; }
    .loan-card, .feature-card { border: 1px solid var(--line); border-radius: 20px; padding: 32px 24px; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.02); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .loan-card { cursor: pointer; text-align: center; }
    .loan-card:hover, .feature-card:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: 0 20px 35px rgba(0,0,0,0.08); }
    .icon { font-size: 48px; margin-bottom: 16px; display: inline-block; transition: transform 0.3s ease; }
    .loan-card:hover .icon { transform: scale(1.1); }
    .loan-card h3, .feature-card h3 { color: var(--blue); font-size: 20px; margin-bottom: 12px; font-weight: 800; }
    .loan-card p { font-size: 14px; font-weight: 600; color: #1e3a5f; }

    /* ── Calculator ── */
    .calculator { background: #f1f5f9; padding: 80px 5%; }
    .box, .form-box, .calling-box { max-width: 620px; margin: 0 auto; background: #fff; border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid var(--line); }
    input, select, textarea { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; margin: 10px 0; font-size: 14px; font-weight: 600; transition: all 0.2s ease; background: #f8fafc; }
    input:focus, select:focus, textarea:focus { background: #fff; border-color: var(--gold); box-shadow: 0 0 0 4px rgba(212,175,55,0.15); outline: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .result { background: var(--blue); color: #fff; padding: 24px; border-radius: 16px; margin-top: 24px; text-align: center; display: none; animation: fadeIn 0.3s ease; }

    /* ── Form / Calling ── */
    .form-wrap, .calling { background: #f8fafc; min-height: 100vh; padding: 60px 5%; }
    .msg { text-align: center; margin-top: 18px; font-size: 14px; font-weight: 600; min-height: 24px; }
    .ok  { color: var(--green); font-weight: 800; }
    .err { color: var(--red);   font-weight: 800; }

    /* ── Dashboard ── */
    .dashboard { background: var(--bg); color: #fff; min-height: 100vh; padding: 32px; }
    .dash-head { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
    .dash-head h1 { color: var(--gold); font-size: 32px; font-weight: 900; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .kpi-card { background: var(--card); border: 1px solid rgba(212,175,55,0.15); border-radius: 20px; padding: 24px; transition: transform 0.2s ease; }
    .kpi-card:hover { transform: translateY(-3px); }
    .kpi { font-size: 36px; font-weight: 900; color: var(--gold); }
    .kpi-label { color: var(--muted); font-size: 13px; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .table-box { background: var(--card); border-radius: 20px; padding: 24px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.03); }
    table { width: 100%; border-collapse: collapse; color: #fff; background: var(--card); }
    th { background: rgba(255,255,255,0.02); color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; text-align: left; padding: 16px; font-size: 12px; white-space: nowrap; }
    td { padding: 16px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; font-weight: 600; white-space: nowrap; }

    /* ── Business Card ── */
    .card-page { background: radial-gradient(circle at center, #0d2750, var(--bg)); min-height: 100vh; padding: 40px 20px; display: flex; align-items: center; justify-content: center; }
    .business-card { width: 400px; max-width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.25); backdrop-filter: blur(16px); border-radius: 28px; padding: 40px 30px; text-align: center; color: #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
    .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 20px; object-fit: cover; }
    .business-card h1 { color: var(--gold); font-size: 28px; margin-bottom: 8px; font-weight: 800; }
    .card-link { display: block; background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.15); color: #fff; padding: 14px; border-radius: 14px; margin: 12px 0; font-weight: 700; transition: all 0.2s ease; }
    .card-link:hover { background: var(--gold); color: #000; border-color: var(--gold); transform: scale(1.02); }

    /* ── Bulbhul Chat ── */
    .bulbhul-btn { position: fixed; right: 24px; bottom: 24px; width: 64px; height: 64px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 100; cursor: pointer; box-shadow: 0 10px 30px rgba(212,175,55,0.3); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .bulbhul-btn:hover { transform: scale(1.1) rotate(10deg); }
    .chat { display: none; position: fixed; right: 24px; bottom: 104px; width: 380px; max-width: calc(100vw - 30px); height: 520px; background: #fff; border-radius: 24px; z-index: 99; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid var(--line); animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1); }
    .chat-head { background: var(--blue); color: #fff; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 16px; }
    .chat-body { height: 384px; overflow-y: auto; background: #f8fafc; padding: 20px; }
    .bubble { padding: 12px 16px; border-radius: 16px; margin: 10px 0; font-size: 13px; line-height: 1.5; max-width: 85%; word-wrap: break-word; }
    .bot  { background: #fff; color: #0a1628; border: 1px solid var(--line); border-top-left-radius: 4px; }
    .user { background: var(--blue); color: #fff; margin-left: auto; border-top-right-radius: 4px; }
    .chat-input { height: 72px; display: flex; gap: 10px; align-items: center; padding: 16px 20px; border-top: 1px solid var(--line); background: #fff; }
    .chat-input input { flex: 1; margin: 0; border-radius: 24px; background: #f1f5f9; border-color: transparent; padding: 12px 18px; }
    .chat-input input:focus { background: #fff; }

    /* ── Bank Chips ── */
    .bank-chip { display: flex; align-items: center; gap: 10px; border: 1.5px solid #cbd5e1; border-radius: 12px; padding: 12px 16px; background: #fff; cursor: pointer; transition: all 0.2s ease; user-select: none; }
    .bank-chip input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
    .bank-chip.selected { border-color: var(--gold); background: rgba(212,175,55,0.05); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }

    /* ── Footer ── */
    .footer { background: var(--blue); color: #fff; text-align: center; padding: 60px 5%; }

    /* ── Animations ── */
    @keyframes fadeIn    { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp   { from { opacity:0; transform:translateY(30px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes popIn     { 0%{opacity:0;transform:scale(0.85);} 70%{opacity:1;transform:scale(1.03);} 100%{opacity:1;transform:scale(1);} }
    @keyframes tickBounce{ 0%{transform:scale(0);} 60%{transform:scale(1.2);} 100%{transform:scale(1);} }
    .thankyou-pop { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .success-circle { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--green),#059669); display:flex; align-items:center; justify-content:center; margin:0 auto; box-shadow:0 10px 30px rgba(16,185,129,0.35); animation:tickBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.15s both; }
    .success-tick { color:#fff; font-size:40px; font-weight:900; }
    .check-item { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; color:#0a1628; opacity:0; animation:fadeIn 0.4s ease forwards; }
    .check-item:nth-child(1){animation-delay:0.3s} .check-item:nth-child(2){animation-delay:0.4s}
    .check-item:nth-child(3){animation-delay:0.5s} .check-item:nth-child(4){animation-delay:0.6s}
    .check-item:nth-child(5){animation-delay:0.7s} .check-item:nth-child(6){animation-delay:0.8s}
    .check-item:nth-child(7){animation-delay:0.9s}
    .check-mark { color:var(--green); font-weight:900; flex-shrink:0; }

    /* ── Responsive ── */
    @media(max-width:780px){
      .hero { grid-template-columns:1fr; padding:40px 5%; }
      .hero h1 { font-size:32px; }
      .hero .btn { display:block; width:100%; text-align:center; margin:10px 0 0 0 !important; }
      .header { flex-wrap:wrap; padding:12px 4%; }
      .header > .btn { display:none; }
      .nav { display:flex; width:100%; order:3; gap:18px; overflow-x:auto; padding-top:10px; -webkit-overflow-scrolling:touch; white-space:nowrap; }
      .nav::-webkit-scrollbar { display:none; }
      .grid-2 { grid-template-columns:1fr; gap:10px; }
      .topbar { text-align:center; justify-content:center; }
      .logo { font-size:20px; }
      .box,.form-box,.calling-box { padding:24px 18px; }
      .dashboard { padding:16px; }
      .dash-head h1 { font-size:24px; }
      .business-card { padding:30px 20px; }
      .table-box { padding:14px; }
      .chat { width:calc(100vw - 20px); right:10px; height:480px; }
      .section { padding:50px 5%; }
      .title { font-size:28px; }
    }
  </style>
</head>

<body>
  <!-- BOOT DATA: injected as JSON by doGet — safe application/json type, no XSS risk -->
  <script id="BOOT_DATA" type="application/json">__P1_BOOT_DATA_JSON__</script>

  <div id="app"></div>

  <!-- Floating Bulbhul AI -->
  <div class="bulbhul-btn" id="bulbhulBtn" onclick="toggleChat()" title="Bulbhul AI Banker">💬</div>
  <div class="chat" id="chat" role="dialog" aria-label="Bulbhul AI Chat">
    <div class="chat-head">
      <span>Bulbhul AI Banker</span>
      <span onclick="toggleChat()" style="cursor:pointer;font-size:20px" aria-label="Close chat">✕</span>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="bubble bot">Namaste! Main Bulbhul hun. Loan, documents, eligibility ya case status ke liye message karein.</div>
    </div>
    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." onkeypress="if(event.key==='Enter')sendBulbhul()" aria-label="Chat message">
      <button class="btn" id="chatSendBtn" style="padding:10px 14px;border-radius:50%" onclick="sendBulbhul()" aria-label="Send message">➤</button>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════
       BOOT — read from JSON script tag (CSP-safe)
    ═══════════════════════════════════════════════════ */
    let BOOT = {};
    try {
      const raw = document.getElementById('BOOT_DATA').textContent.trim();
      if (raw && raw !== '__P1_BOOT_DATA_JSON__') BOOT = JSON.parse(raw);
    } catch (e) {
      console.warn('BOOT_DATA parse failed:', e.message, '— running with fallback defaults.');
    }

    const qs       = new URLSearchParams(location.search);
    const PAGE     = String(BOOT.page     || qs.get('page')     || 'home').toLowerCase();
    const EMP      = String(BOOT.emp      || qs.get('emp')      || qs.get('emp_code') || '').toUpperCase();
    const PRODUCT  = String(BOOT.product  || qs.get('product')  || '').toUpperCase();
    const EMP_ENC  = encodeURIComponent(EMP);
    const GATED_PAGES = ['dashboard', 'card', 'calling', 'voice'];
    let ACCESS_TOKEN  = String(qs.get('accessToken') || '');
    if (!ACCESS_TOKEN && EMP) {
      try { ACCESS_TOKEN = sessionStorage.getItem('p1_token_' + EMP) || ''; } catch (e) {}
    }

    const BASE_URL = BOOT.baseUrl || location.href.split('?')[0];

    const PRODUCTS = Array.isArray(BOOT.products) ? BOOT.products : [];

    const STAFF_DATA     = BOOT.staff     || null;
    const DASHBOARD_DATA = BOOT.dashboard || null;
    const BANK_MAP       = BOOT.banks     || {};
    const MOBILE_RE      = /^[6-9]\d{9}$/;

    /* ── Utilities ── */
    function hasBackend() { return !!(window.google && google.script && google.script.run); }
    function app(html)    { document.getElementById('app').innerHTML = html; }
    function base()       { return String(BOOT.baseUrl || BASE_URL || '').trim() || location.href.split('?')[0]; }
    function money(n)     { const num = Number(n); return Number.isFinite(num) ? num.toLocaleString('en-IN') : '0'; }
    function safe(s) {
      return String(s || '').replace(/[&<>"']/g, function(m) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m];
      });
    }
    function routeUrl(page, extra) {
      let url = base() + '?page=' + encodeURIComponent(page || 'home');
      if (EMP && EMP !== 'EMP_CODE') url += '&emp=' + EMP_ENC;
      if (ACCESS_TOKEN && GATED_PAGES.indexOf(String(page || '').toLowerCase()) > -1) {
        url += '&accessToken=' + encodeURIComponent(ACCESS_TOKEN);
      }
      if (extra) Object.keys(extra).forEach(function(k) {
        if (extra[k] !== undefined && extra[k] !== '') url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(extra[k]);
      });
      return url;
    }
    function go(p) {
      const val = String(p || '');
      const url = val.charAt(0) === '?' ? base() + val : routeUrl(val || 'home');
      window.top.location.href = url;
    }

    /* ── Shared Header ── */
    function layoutHeader() {
      return `
        <div class="topbar">
          <div>📞 +91-7838074351 | ✉️ support@divyanshicapital.com</div>
          <div>Divyanshi Capital | Digital Services</div>
        </div>
        ${EMP ? `<div class="staff-banner">👤 Staff Link Active: ${safe(EMP)} | Lead mapping active</div>` : ''}
        <div class="header">
          <div class="logo">DIVYANSHI CAPITAL</div>
          <nav class="nav" aria-label="Main navigation">
            <a href="${routeUrl('home')}">Home</a>
            <a href="${routeUrl('form')}">Apply</a>
            <a href="${routeUrl('card')}">Card</a>
            <a href="${routeUrl('dashboard')}">Dashboard</a>
            <a href="${routeUrl('calling')}">Calling</a>
            <a href="${routeUrl('voice')}">Voice</a>
          </nav>
          <a class="btn" href="${routeUrl('form')}">Apply Now</a>
        </div>`;
    }

    /* ══════════════════════════════════════════════════
       PAGE: HOME
    ══════════════════════════════════════════════════ */
    function renderHome() {
      app(`
        ${layoutHeader()}
        <div class="hero">
          <div>
            <h1>Smart Loan Support for Every Financial Need</h1>
            <p>Divyanshi Capital helps clients with Personal Loan, Business Loan, Home Loan, LAP and Auto Loan. Bulbhul AI guides documents, eligibility and next steps without CIBIL hit.</p>
            <a class="btn" href="${routeUrl('form')}">Get Free Consultation</a>
            <a class="btn orange" style="margin-left:10px" href="#calculator">Check EMI</a>
          </div>
          <div class="hero-card">
            <h3>Why Divyanshi Capital?</h3>
            <ul>
              <li>✅ Bank and NBFC fitment guidance</li>
              <li>✅ Product-wise document checklist</li>
              <li>✅ Staff-wise digital lead link</li>
              <li>✅ Bulbhul AI support</li>
              <li>✅ Fast follow-up and case tracking</li>
            </ul>
          </div>
        </div>

        <div class="section" id="loans">
          <h2 class="title">Loan Products</h2>
          <div class="grid">
            ${PRODUCTS.length ? PRODUCTS.map(function(p) {
              return `<div class="loan-card" onclick="go('?page=form&emp=${EMP_ENC}&product=${encodeURIComponent(p.code||'')}')">
                <div class="icon">${safe(p.icon || '💼')}</div>
                <h3>${safe(p.name)}</h3>
                <p>TAT: ${money(p.tat || 7)} Days | Starting ROI approx ${money(p.roi || 10.5)}%</p>
              </div>`;
            }).join('') : '<div class="feature-card"><h3>Products unavailable</h3><p>Please try again shortly.</p></div>'}
          </div>
        </div>

        <div class="calculator" id="calculator">
          <h2 class="title">Pre-Eligibility Calculator</h2>
          <div class="box">
            <select id="calcLoanType">
              ${PRODUCTS.map(function(p) { return `<option value="${safe(p.code)}">${safe(p.name)}</option>`; }).join('')}
            </select>
            <input id="calcIncome"  type="number" placeholder="Monthly Income ₹">
            <input id="calcAmount"  type="number" placeholder="Required Loan Amount ₹">
            <input id="calcTenure"  type="number" placeholder="Tenure (Years)">
            <button class="btn" id="calcBtn" style="width:100%;margin-top:10px" onclick="calcEMI()">Check Eligibility</button>
            <div class="result" id="calcResult">
              <h3 id="calcEmiDisplay">EMI: ₹0</h3>
              <p  id="calcEligDisplay"></p>
              <br>
              <button class="btn" onclick="go('?page=form&emp=${EMP_ENC}&product='+encodeURIComponent(document.getElementById('calcLoanType').value))">Apply Now</button>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="title">Digital Suite</h2>
          <div class="grid">
            <div class="feature-card"><h3>Smart Form</h3><p>Lead routes directly to CRM with staff mapping.</p></div>
            <div class="feature-card"><h3>Digital Card</h3><p>Every staff can share their business card and lead link.</p></div>
            <div class="feature-card"><h3>Dashboard</h3><p>Staff and management view cases and progress in real time.</p></div>
            <div class="feature-card"><h3>Bulbhul AI</h3><p>Client and staff assistant for documents, eligibility and case status.</p></div>
          </div>
        </div>

        <div class="footer">
          <h2 style="font-size:28px;margin-bottom:20px">Need a professional loan consultation?</h2>
          <a class="btn" href="${routeUrl('form')}">Contact Us Online</a>
        </div>

    /* ══════════════════════════════════════════════════
       EMI CALCULATOR
    ══════════════════════════════════════════════════ */
    function calcEMI() {
      if (!PRODUCTS.length) { alert('Loan products are temporarily unavailable'); return; }
      const amount = Number(document.getElementById('calcAmount').value  || 0);
      const income = Number(document.getElementById('calcIncome').value  || 0);
      const years  = Number(document.getElementById('calcTenure').value  || 0);
      const code   = document.getElementById('calcLoanType').value;
      if (!amount || !income || !years) { alert('Please fill in income, amount and tenure'); return; }

      const product = PRODUCTS.find(function(x) { return x.code === code; }) || PRODUCTS[0];
      const months  = years * 12;
      const rate    = (Number(product.roi) || 10.5) / 12 / 100;
      const emi     = (amount * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
      const eligible = emi < income * 0.5;

      document.getElementById('calcEmiDisplay').innerText = 'EMI: ₹' + money(Math.round(emi));
      document.getElementById('calcEligDisplay').innerText = eligible
        ? '✅ Profile looks workable. You can apply now.'
        : '⚠ EMI is high relative to income. Consider reducing amount or increasing tenure.';
      document.getElementById('calcResult').style.display = 'block';

      if (eligible && hasBackend()) {
        google.script.run
          .withFailureHandler(function(e) { console.error('Calc log failed:', e.message); })
          .P1_SAVE_CALC_LEAD({ empCode: EMP, loanType: code, income: income, amount: amount, tenure: years, emi: Math.round(emi) });
      }
    }

    /* ══════════════════════════════════════════════════
       FORM SUBMISSION — uses professional return fields:
       success / errorMessage / leadId / tatDays /
       requiredDocuments / uploadedDocuments
    ══════════════════════════════════════════════════ */
    function fileToBase64_(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();
        reader.onload  = function() { resolve(reader.result); };
        reader.onerror = function() { reject(reader.error); };
        reader.readAsDataURL(file);
      });
    }

    function bindForm() {
      const form = document.getElementById('leadForm');
      if (!form) return;

      form.onsubmit = async function(event) {
        event.preventDefault();
        const formData   = Object.fromEntries(new FormData(form));
        const messageEl  = document.getElementById('formMsg');
        const submitBtn  = document.getElementById('submitBtn');

        // Validate mobile
        if (!MOBILE_RE.test(String(formData.client_mobile || '').trim())) {
          messageEl.className = 'msg err';
          messageEl.innerText = '❌ Please enter a valid 10-digit mobile number';
          return;
        }

        // Backend check
        if (!hasBackend()) {
          messageEl.className = 'msg err';
          messageEl.innerText = '❌ Backend not connected. Please open via the deployed Web App link.';
          return;
        }

        // File validation
        const fileInput  = document.getElementById('docFiles');
        const rawFiles   = fileInput ? Array.from(fileInput.files || []) : [];
        if (rawFiles.length > 5) {
          messageEl.className = 'msg err';
          messageEl.innerText = '❌ Maximum 5 files allowed.';
          return;
        }
        const oversizedFile = rawFiles.find(function(f) { return f.size > 5 * 1024 * 1024; });
        if (oversizedFile) {
          messageEl.className = 'msg err';
          messageEl.innerText = '❌ File "' + safe(oversizedFile.name) + '" exceeds 5 MB limit.';
          return;
        }

        // Convert files to base64
        submitBtn.disabled  = true;
        submitBtn.innerText = 'Reading files...';
        messageEl.className = 'msg';
        messageEl.innerText = 'Please wait...';

        let filesPayload = [];
        try {
          filesPayload = await Promise.all(rawFiles.map(async function(f) {
            const dataUrl = await fileToBase64_(f);
            return { name: f.name, mimeType: f.type || 'application/octet-stream', base64: dataUrl };
          }));
        } catch (fileError) {
          submitBtn.disabled  = false;
          submitBtn.innerText = 'Submit Application';
          messageEl.className = 'msg err';
          messageEl.innerText = '❌ Could not read file(s): ' + safe(fileError.message || fileError);
          return;
        }

        formData.files      = filesPayload;
        submitBtn.innerText = 'Submitting...';

        let requestSettled = false;
        const timeoutHandle = setTimeout(function() {
          if (requestSettled) return;
          submitBtn.disabled  = false;
          submitBtn.innerText = 'Submit Application';
          messageEl.className = 'msg err';
          messageEl.innerText = '⚠ No response from server after 25 seconds. Please try again.';
        }, 25000);

        google.script.run
          .withSuccessHandler(function(response) {
            requestSettled  = true;
            clearTimeout(timeoutHandle);
            submitBtn.disabled  = false;
            submitBtn.innerText = 'Submit Application';

            /* ── PROFESSIONAL FIELD NAMES from DC_PROCESS_LEAD_ ── */
            if (response && response.success) {
              renderThankYou(
                formData.client_name,
                response.leadId,
                response.tatDays,
                response.requiredDocuments  || [],
                response.uploadedDocuments  || 0
              );
            } else {
              messageEl.className = 'msg err';
              messageEl.innerText = '❌ Error: ' + safe((response && response.errorMessage) || 'Submission failed');
            }
          })
          .withFailureHandler(function(error) {
            requestSettled  = true;
            clearTimeout(timeoutHandle);
            submitBtn.disabled  = false;
            submitBtn.innerText = 'Submit Application';
            messageEl.className = 'msg err';
            messageEl.innerText = '❌ ' + safe(error.message || error);
          })
          .P1_SMART_FORM_SUBMIT(formData);
      };
    }

        <div class="form-wrap" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
          <div class="form-box thankyou-pop" style="text-align:center;max-width:400px">
            <div style="font-size:48px;margin-bottom:6px">🔒</div>
            <h2 style="color:var(--blue);margin-bottom:6px">Internal Team Access</h2>
            <p style="color:var(--muted);font-size:13px;margin-bottom:20px">Divyanshi Capital staff only. Enter your Employee Code and PIN.</p>
            <input id="gateEmployeeCode" placeholder="Employee Code" value="${safe(EMP)}" style="text-transform:uppercase" autocomplete="username">
            <input id="gatePinCode"      placeholder="PIN"           type="password" inputmode="numeric" autocomplete="current-password">
            <button class="btn" id="gateVerifyBtn" style="width:100%;margin-top:10px" onclick="verifyGate('${targetPage}')">Verify and Continue</button>
            <div id="gateMsg" class="msg" role="alert"></div>
            <p style="color:var(--muted);font-size:11px;margin-top:16px">Not staff? <a href="${routeUrl('home')}" style="color:var(--gold);font-weight:700">Go to homepage</a></p>
          </div>
        </div>
      `);
    }

    function verifyGate(targetPage) {
      const empInput  = document.getElementById('gateEmployeeCode');
      const pinInput  = document.getElementById('gatePinCode');
      const verifyBtn = document.getElementById('gateVerifyBtn');
      const messageEl = document.getElementById('gateMsg');

      const empValue = empInput.value.trim().toUpperCase();
      const pinValue = pinInput.value.trim();

      if (!empValue) {
        messageEl.className = 'msg err';
        messageEl.innerText = 'Please enter your Employee Code';
        return;
      }
      if (!hasBackend()) {
        messageEl.className = 'msg err';
        messageEl.innerText = '❌ Backend not connected.';
        return;
      }

      verifyBtn.disabled  = true;
      messageEl.className = 'msg';
      messageEl.innerText = 'Verifying...';

      google.script.run
        .withSuccessHandler(function(response) {
          verifyBtn.disabled = false;
          /* ── uses success / errorMessage from P1_VERIFY_ACCESS ── */
          if (response && response.success) {
            if (!response.accessToken) {
              messageEl.className = 'msg err';
              messageEl.innerText = '❌ Server did not return a secure session';
              return;
            }
            ACCESS_TOKEN = response.accessToken;
            try { sessionStorage.setItem('p1_token_' + empValue, ACCESS_TOKEN); } catch (e) {}
            window.top.location.href = base() + '?page=' + encodeURIComponent(targetPage) +
              '&emp=' + encodeURIComponent(empValue) + '&accessToken=' + encodeURIComponent(ACCESS_TOKEN);
          } else {
            messageEl.className = 'msg err';
            messageEl.innerText = '❌ ' + ((response && response.errorMessage) || 'Access denied');
          }
        })
        .withFailureHandler(function(error) {
          verifyBtn.disabled  = false;
          messageEl.className = 'msg err';
          messageEl.innerText = '❌ ' + (error.message || error);
        })
        .P1_VERIFY_ACCESS(empValue, pinValue);
    }

    /* ══════════════════════════════════════════════════
       ROUTER — main entry point
    ══════════════════════════════════════════════════ */
    function renderApp() {
      try {
        if (!document.getElementById('app')) return;

        // Gate check for protected pages
        if (GATED_PAGES.indexOf(PAGE) > -1 && !isGateVerified(EMP)) {
          renderAccessGate(PAGE);
          return;
        }

        if (PAGE === 'form' || PAGE === 'smart') {
          renderForm();
        } else if (PAGE === 'dashboard') {
          renderDashboard();
        } else if (PAGE === 'card') {
          renderCard();
        } else if (PAGE === 'calling') {
          renderCalling();
        } else {
          renderHome();
        }
      } catch (routeError) {
        document.getElementById('app').innerHTML =
          `<div style="padding:40px;font-family:Arial">
             <h2 style="color:#dc2626">Page Error</h2>
             <p>${safe(routeError.message || routeError)}</p>
           </div>`;
      }
    }

    renderApp();
  </script>
</body>
</html>

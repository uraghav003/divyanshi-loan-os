<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="referrer" content="no-referrer">
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Divyanshi Capital AI Based OS</title>
  <meta name="description" content="Divyanshi Capital - Smart Loan Support for Personal Loan, Business Loan, Home Loan, LAP and Auto Loan.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    h1,h2,h3,h4,.logo,.btn{font-family:'Outfit',sans-serif}
    :root{
      --blue:#0B1F3A;--blue2:#1a3a6b;--gold:#C9A84C;--gold-hover:#b8932e;
      --orange:#F97316;--bg:#060f1e;--card:#0d1d3a;--muted:#94A3B8;
      --line:#e2e8f0;--green:#10b981;--red:#ef4444;--white:#ffffff;
    }
    body{background:#f8fafc;color:#0a1628;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    input,select,textarea,button{font-family:inherit}

    .topbar{background:var(--blue);color:#fff;padding:10px 5%;font-size:13px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .header{background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);padding:14px 5%;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.03);position:sticky;top:0;z-index:50;border-bottom:1px solid #e2e8f0}
    .logo{display:flex;align-items:center}
    .logo img{display:block;height:42px;width:auto;max-width:210px;object-fit:contain}
    .identity-logo{display:block;width:172px;max-width:100%;height:auto;background:#fff;border-radius:8px;padding:7px}
    .nav{display:flex;gap:28px;align-items:center}
    .nav a{font-size:14px;font-weight:600;color:#334155;transition:color .2s;position:relative;padding:4px 0}
    .nav a:hover,.nav a.active{color:var(--gold)}
    .nav a.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--gold);border-radius:2px}

    .btn{background:var(--gold);color:#000;border:0;border-radius:10px;padding:11px 22px;font-weight:800;font-size:14px;cursor:pointer;display:inline-block;transition:all .25s;box-shadow:0 4px 12px rgba(212,175,55,.2)}
    .btn:hover{background:var(--gold-hover);transform:translateY(-2px)}
    .btn:disabled{opacity:.5;pointer-events:none}
    .btn.orange{background:var(--orange);color:#fff}

    .staff-banner{background:linear-gradient(135deg,var(--gold),#fcd34d);color:#0f172a;padding:11px 5%;text-align:center;font-weight:800;font-size:13px}

    .hero{background:radial-gradient(circle at top right,var(--blue2),var(--blue));color:#fff;padding:70px 5%;display:grid;grid-template-columns:1.15fr .85fr;gap:50px;align-items:center}
    .hero h1{font-size:46px;line-height:1.15;margin-bottom:18px;font-weight:900}
    .hero p{font-size:16px;line-height:1.7;color:#cbd5e1;margin-bottom:28px}
    .hero-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.25);border-radius:22px;padding:30px}
    .hero-card h3{color:var(--gold);font-size:19px;margin-bottom:16px;font-weight:800}
    .hero-card li{margin:12px 0;font-size:15px;list-style:none;display:flex;align-items:center;gap:10px;color:#e2e8f0}

    .section{padding:70px 5%}
    .title{text-align:center;color:var(--blue);font-size:34px;font-weight:800;margin-bottom:36px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:24px}
    .loan-card,.feature-card{border:1px solid var(--line);border-radius:18px;padding:28px 22px;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.02);transition:all .3s;text-align:center}
    .loan-card{cursor:pointer}
    .loan-card:hover,.feature-card:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 16px 32px rgba(0,0,0,.07)}
    .icon{font-size:44px;margin-bottom:14px;display:inline-block}
    .loan-card h3,.feature-card h3{color:var(--blue);font-size:19px;margin-bottom:10px;font-weight:800}

    .calculator{background:#f1f5f9;padding:70px 5%}
    .box,.form-box,.calling-box{max-width:600px;margin:0 auto;background:#fff;border-radius:22px;padding:36px;box-shadow:0 16px 36px rgba(0,0,0,.05);border:1px solid var(--line)}
    input,select,textarea{width:100%;padding:13px 14px;border:1px solid #cbd5e1;border-radius:11px;margin:9px 0;font-size:14px;font-weight:600;background:#f8fafc;transition:all .2s}
    input:focus,select:focus,textarea:focus{background:#fff;border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,175,55,.12);outline:none}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .result{background:var(--blue);color:#fff;padding:22px;border-radius:14px;margin-top:20px;text-align:center;display:none}

    .form-wrap,.calling{background:#f8fafc;min-height:100vh;padding:50px 5%}
    .msg{text-align:center;margin-top:16px;font-size:14px;font-weight:600;min-height:22px}
    .ok{color:var(--green)}.err{color:var(--red)}

    .dashboard{background:var(--bg);color:#fff;min-height:100vh;padding:28px}
    .dash-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:28px}
    .dash-head h1{color:var(--gold);font-size:30px;font-weight:900}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px}
    .kpi-card{background:var(--card);border:1px solid rgba(212,175,55,.15);border-radius:18px;padding:20px}
    .kpi{font-size:32px;font-weight:900;color:var(--gold)}
    .kpi-label{color:var(--muted);font-size:12px;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
    .table-box{background:var(--card);border-radius:18px;padding:20px;overflow-x:auto;border:1px solid rgba(255,255,255,.03)}
    table{width:100%;border-collapse:collapse;color:#fff}
    th{background:rgba(255,255,255,.02);color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-weight:700;text-align:left;padding:14px;font-size:11px;white-space:nowrap}
    td{padding:14px;border-top:1px solid rgba(255,255,255,.05);font-size:13px;font-weight:600;white-space:nowrap}

    .card-page{background:radial-gradient(circle at center,#0d2750,var(--bg));min-height:100vh;padding:40px 20px;display:flex;align-items:center;justify-content:center}
    .business-card{width:380px;max-width:100%;background:rgba(255,255,255,.02);border:1px solid rgba(212,175,55,.25);backdrop-filter:blur(16px);border-radius:26px;padding:36px 28px;text-align:center;color:#fff}
    .avatar{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);margin-bottom:16px;object-fit:cover}
    .business-card h1{color:var(--gold);font-size:26px;margin-bottom:6px;font-weight:800}
    .card-link{display:block;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.15);color:#fff;padding:13px;border-radius:12px;margin:10px 0;font-weight:700;transition:all .2s}
    .card-link:hover{background:var(--gold);color:#000;border-color:var(--gold)}

    .identity-shell{width:min(1120px,100%);margin:auto;color:#fff}
    .identity-toolbar{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:18px}
    .identity-eyebrow{font:700 11px 'Inter',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#8fa3bd}
    .identity-title{font:900 clamp(28px,5vw,44px) 'Outfit',sans-serif;letter-spacing:-.04em;margin-top:4px}
    .identity-actions{display:flex;gap:10px;flex-wrap:wrap}
    .identity-action{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}
    .identity-action:hover{border-color:var(--role-accent,#c9a84c);color:var(--role-accent,#c9a84c)}
    .identity-card{--role-accent:#c9a84c;position:relative;min-height:430px;overflow:hidden;border-radius:30px;background:#071a34;border:1px solid rgba(255,255,255,.09);box-shadow:0 30px 80px rgba(0,0,0,.38);padding:clamp(26px,5vw,54px);display:grid;grid-template-columns:1.2fr .8fr;gap:32px}
    .identity-card::before,.identity-card::after{content:'';position:absolute;border-radius:50%;pointer-events:none}
    .identity-card::before{width:440px;height:440px;right:-165px;bottom:-245px;border:70px solid color-mix(in srgb,var(--role-accent) 14%,transparent)}
    .identity-card::after{width:520px;height:520px;right:-205px;bottom:-285px;border:1px solid color-mix(in srgb,var(--role-accent) 50%,transparent)}
    .identity-stripe{position:absolute;inset:auto 0 0;height:7px;background:linear-gradient(90deg,var(--role-accent),#f97316,var(--role-accent))}
    .identity-main{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:space-between}
    .identity-name{font:900 clamp(32px,5vw,54px) 'Outfit',sans-serif;letter-spacing:-.04em;line-height:1}
    .identity-role{font:800 clamp(17px,2.5vw,23px) 'Outfit',sans-serif;color:var(--role-accent);margin-top:10px}
    .identity-dept{margin-top:8px;color:#a8b7ca;font-size:13px;text-transform:uppercase;letter-spacing:.12em}
    .identity-contact{display:grid;gap:14px;margin-top:42px}
    .identity-contact a,.identity-contact div{display:flex;align-items:center;gap:12px;color:#eef4fb;font-weight:650}
    .identity-contact-mark{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:color-mix(in srgb,var(--role-accent) 18%,transparent);color:var(--role-accent);flex:none}
    .identity-side{position:relative;z-index:2;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;text-align:right}
    .identity-brand{font:900 19px 'Outfit',sans-serif;letter-spacing:.02em}
    .identity-tagline{font:800 10px 'Inter',sans-serif;letter-spacing:.22em;text-transform:uppercase;color:var(--role-accent);max-width:180px;line-height:1.6;margin-top:10px}
    .identity-links{display:grid;gap:10px;width:min(230px,100%)}
    .identity-link{display:block;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);font-weight:800;text-align:center}
    .identity-link.primary{background:var(--role-accent);border-color:var(--role-accent);color:#071a34}
    .identity-help{margin-top:18px;color:#8fa3bd;font-size:12px;text-align:center}

    .bulbhul-btn{position:fixed;right:22px;bottom:22px;width:60px;height:60px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;z-index:100;cursor:pointer;box-shadow:0 8px 24px rgba(212,175,55,.3);transition:all .3s}
    .bulbhul-btn:hover{transform:scale(1.08)}
    .chat{display:none;position:fixed;right:22px;bottom:96px;width:360px;max-width:calc(100vw - 28px);height:500px;background:#fff;border-radius:22px;z-index:99;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.15);border:1px solid var(--line)}
    .chat-head{background:var(--blue);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;font-weight:800}
    .chat-body{height:370px;overflow-y:auto;background:#f8fafc;padding:18px}
    .bubble{padding:11px 14px;border-radius:14px;margin:9px 0;font-size:13px;line-height:1.5;max-width:85%;word-wrap:break-word}
    .bot{background:#fff;color:#0a1628;border:1px solid var(--line)}
    .user{background:var(--blue);color:#fff;margin-left:auto}
    .chat-input{height:68px;display:flex;gap:8px;align-items:center;padding:14px 16px;border-top:1px solid var(--line);background:#fff}
    .chat-input input{flex:1;margin:0;border-radius:22px;background:#f1f5f9;border-color:transparent;padding:11px 16px}

    .bank-chip{display:flex;align-items:center;gap:8px;border:1.5px solid #cbd5e1;border-radius:11px;padding:11px 14px;background:#fff;cursor:pointer;transition:all .2s;user-select:none}
    .bank-chip.selected{border-color:var(--gold);background:rgba(212,175,55,.06)}

    .footer{background:var(--blue);color:#fff;text-align:center;padding:50px 5%}

    @media(max-width:780px){
      .hero{grid-template-columns:1fr;padding:40px 5%}
      .hero h1{font-size:30px}
      .header{flex-wrap:wrap;padding:12px 4%}
      .header>.btn{display:none}
      .nav{display:flex;width:100%;order:3;gap:20px;overflow-x:auto;padding-top:10px;white-space:nowrap}
      .nav::-webkit-scrollbar{display:none}
      .grid-2{grid-template-columns:1fr}
      .logo{font-size:18px}
      .box,.form-box,.calling-box{padding:24px 18px}
      .dashboard{padding:16px}
      .dash-head h1{font-size:22px}
      .chat{width:calc(100vw - 20px);right:10px}
      .section{padding:45px 5%}
      .title{font-size:26px}
      .card-page{padding:24px 14px;align-items:flex-start}
      .identity-toolbar{align-items:flex-start;flex-direction:column}
      .identity-card{grid-template-columns:1fr;min-height:620px;border-radius:22px}
      .identity-side{align-items:flex-start;text-align:left}
      .identity-links{width:100%}
    }

    @media print{
      body{background:#fff}
      body>*:not(#app){display:none!important}
      .identity-toolbar,.identity-help{display:none!important}
      .card-page{padding:0;background:#fff;min-height:auto}
      .identity-card{box-shadow:none;width:100%;min-height:430px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    }
  </style>
</head>
<body>
  <script id="BOOT_DATA" type="application/json">__P1_BOOT_DATA_JSON__</script>
  <div id="app"></div>

  <div class="bulbhul-btn" id="bulbhulBtn" onclick="toggleChat()" title="Divyanshi Assistant">💬</div>
  <div class="chat" id="chat">
    <div class="chat-head">
      <span>Divyanshi Assistant</span>
      <span onclick="toggleChat()" style="cursor:pointer;font-size:20px">✕</span>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="bubble bot">Namaste! Main Divyanshi Assistant hoon. Loan, documents, eligibility ya case status ke liye message karein.</div>
    </div>
    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." onkeypress="if(event.key==='Enter')sendBulbhul()">
      <button class="btn" style="padding:10px 14px;border-radius:50%" onclick="sendBulbhul()">➤</button>
    </div>
  </div>

  <script>
    let BOOT = {};
    try {
      const raw = document.getElementById('BOOT_DATA').textContent.trim();
      if (raw && raw !== '__P1_BOOT_DATA_JSON__') BOOT = JSON.parse(raw);
    } catch(e) {}

    const qs = new URLSearchParams(location.search);
    const PAGE = String(BOOT.page || qs.get('page') || 'home').toLowerCase();
    const EMP = String(BOOT.emp || qs.get('emp') || qs.get('emp_code') || '').toUpperCase();
    try{const launchToken=qs.get('access_token');if(launchToken){sessionStorage.setItem('p1_access_'+EMP,launchToken);history.replaceState({},document.title,location.pathname+'?page='+encodeURIComponent(PAGE)+'&emp='+encodeURIComponent(EMP));}}catch(_){ }
    const PRODUCT = String(BOOT.product || qs.get('product') || '').toUpperCase();
    const EMP_ENC = encodeURIComponent(EMP);
    const GATED_PAGES = ['dashboard','calling','voice'];
    const BASE_URL = BOOT.baseUrl || location.href.split('?')[0];

    const PRODUCTS = Array.isArray(BOOT.products) ? BOOT.products : [];

    const STAFF_DATA = BOOT.staff || null;
    const DASHBOARD_DATA = BOOT.dashboard || null;
    const BANK_MAP = BOOT.banks || {};
    const MOBILE_RE = /^[6-9]\d{9}$/;

    function hasBackend(){return !!(window.google && google.script && google.script.run)}
    function app(html){document.getElementById('app').innerHTML=html}
    function base(){return String(BOOT.baseUrl||BASE_URL||'').trim()||location.href.split('?')[0]}
    function money(n){const num=Number(n);return Number.isFinite(num)?num.toLocaleString('en-IN'):'0'}
    function safe(s){return String(s == null ? '' : s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
    function routeUrl(page,extra){
      const targetBase=base();
      let url=targetBase+'?page='+encodeURIComponent(page||'home');
      if(EMP&&EMP!=='EMP_CODE') url+='&emp='+EMP_ENC;
      if(extra) Object.keys(extra).forEach(k=>{if(extra[k]!==undefined&&extra[k]!=='') url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(extra[k])});
      return url;
    }
    function go(p){
      const val=String(p||'');
      const url=val.charAt(0)==='?'?base()+val:routeUrl(val||'home');
      window.top.location.href=url;
    }

    function layoutHeader(){
      const isActive = (p) => PAGE===p ? 'active' : '';
      return `
        <div class="topbar">
          <div>📞 +91-9899032117 | 011-45561492 | ✉️ support@divyanshicapital.com</div>
          <div>Divyanshi Capital | Digital Services</div>
        </div>
        ${EMP?`<div class="staff-banner">👤 Staff Link Active: ${safe(EMP)}</div>`:''}
        <div class="header">
          <a class="logo" href="${routeUrl('home')}" aria-label="Divyanshi Capital home"><img src="https://www.divyanshicapital.com/wp-content/uploads/2021/09/logo1.png" alt="Divyanshi Capital" referrerpolicy="no-referrer"></a>
          <nav class="nav">
            <a href="${routeUrl('home')}" class="${isActive('home')}">Home</a>
            <a href="${routeUrl('form')}" class="${isActive('form')}">Apply</a>
            <a href="${routeUrl('card')}" class="${isActive('card')}">Card</a>
            <a href="${routeUrl('dashboard')}" class="${isActive('dashboard')}">Dashboard</a>
            <a href="${routeUrl('calling')}" class="${isActive('calling')}">Calling</a>
          </nav>
          <a class="btn" href="${routeUrl('form')}">Apply Now</a>
        </div>`;
    }

    function renderHome(){
      app(`
        ${layoutHeader()}
        <div class="hero">
          <div>
            <h1>Smart Loan Support for Every Financial Need</h1>
            <p>Divyanshi Capital helps clients with Personal Loan, Business Loan, Home Loan, LAP and Auto Loan. Divyanshi Assistant guides documents, eligibility and next steps.</p>
            <a class="btn" href="${routeUrl('form')}">Get Free Consultation</a>
            <a class="btn orange" style="margin-left:10px" href="#calculator">Check EMI</a>
          </div>
          <div class="hero-card">
            <h3>Why Divyanshi Capital?</h3>
            <ul>
              <li>✅ Bank and NBFC fitment guidance</li>
              <li>✅ Product-wise document checklist</li>
              <li>✅ Staff-wise digital lead link</li>
              <li>✅ Divyanshi Assistant support</li>
              <li>✅ Fast follow-up and case tracking</li>
            </ul>
          </div>
        </div>
        <div class="section" id="loans">
          <h2 class="title">Loan Products</h2>
          <div class="grid">
            ${PRODUCTS.map(p=>`<div class="loan-card" onclick="go('?page=form&emp=${EMP_ENC}&product=${encodeURIComponent(p.code||'')}')">
              <div class="icon">${p.icon||'💼'}</div>
              <h3>${safe(p.name)}</h3>
              <p>TAT: ${p.tat||7} Days | ROI ~ ${p.roi||10.5}%</p>
            </div>`).join('')}
          </div>
        </div>
        <div class="calculator" id="calculator">
          <h2 class="title">Pre-Eligibility Calculator</h2>
          <div class="box">
            <select id="calcLoanType">${PRODUCTS.map(p=>`<option value="${safe(p.code)}">${safe(p.name)}</option>`).join('')}</select>
            <input id="calcIncome" type="number" placeholder="Monthly Income ₹">
            <input id="calcAmount" type="number" placeholder="Required Loan Amount ₹">
            <input id="calcTenure" type="number" placeholder="Tenure (Years)">
            <button class="btn" style="width:100%;margin-top:10px" onclick="calcEMI()">Check Eligibility</button>
            <div class="result" id="calcResult">
              <h3 id="calcEmiDisplay">EMI: ₹0</h3>
              <p id="calcEligDisplay"></p>
              <br>
              <button class="btn" onclick="go('?page=form&emp=${EMP_ENC}&product='+encodeURIComponent(document.getElementById('calcLoanType').value))">Apply Now</button>
            </div>
          </div>
        </div>
        <div class="section">
          <h2 class="title">Digital Suite</h2>
          <div class="grid">
            <div class="feature-card"><h3>Smart Form</h3><p>Lead routes directly to CRM with staff mapping.</p></div>
            <div class="feature-card"><h3>Digital Card</h3><p>Every staff can share their business card and lead link.</p></div>
            <div class="feature-card"><h3>Dashboard</h3><p>Staff and management view cases and progress in real time.</p></div>
            <div class="feature-card"><h3>Divyanshi Assistant</h3><p>Client and staff assistant for documents, eligibility and case status.</p></div>
          </div>
        </div>
        <div class="footer">
          <h2 style="font-size:26px;margin-bottom:18px">Need a professional loan consultation?</h2>
          <a class="btn" href="${routeUrl('form')}">Contact Us Online</a>
        </div>
      `);
    }

    function renderForm(){
      const staffBanner = (STAFF_DATA && STAFF_DATA.ok) ? `
        <div style="display:flex;align-items:center;gap:12px;background:#fef9e7;border:1px solid rgba(212,175,55,.3);border-radius:14px;padding:12px 16px;margin-bottom:16px">
          <img src="${safe(STAFF_DATA.profilePic)}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)">
          <div style="font-size:13px"><strong style="color:var(--blue)">${safe(STAFF_DATA.name)}</strong><br><span style="color:#64748b">You are applying through their referral link</span></div>
        </div>` : '';

      app(`
        ${layoutHeader()}
        <div class="form-wrap">
          <div class="form-box">
            ${staffBanner}

    function calcEMI(){
      const amount=Number(document.getElementById('calcAmount').value||0);
      const income=Number(document.getElementById('calcIncome').value||0);
      const years=Number(document.getElementById('calcTenure').value||0);
      const code=document.getElementById('calcLoanType').value;
      if(!amount||!income||!years){alert('Please fill income, amount and tenure');return}
      const product=PRODUCTS.find(x=>x.code===code)||PRODUCTS[0];
      if(!product){alert('No active loan products configured in Loan_Bank_Map');return}
      const months=years*12;
      const rate=(Number(product.roi)||10.5)/12/100;
      const emi=(amount*rate*Math.pow(1+rate,months))/(Math.pow(1+rate,months)-1);
      const eligible=emi<income*0.5;
      document.getElementById('calcEmiDisplay').innerText='EMI: ₹'+money(Math.round(emi));
      document.getElementById('calcEligDisplay').innerText=eligible?'✅ Profile looks workable. You can apply now.':'⚠ EMI is high relative to income.';
      document.getElementById('calcResult').style.display='block';
    }

    function fileToBase64_(file){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(reader.result);
        reader.onerror=()=>reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function bindForm(){
      const form=document.getElementById('leadForm');
      if(!form) return;
      form.onsubmit=async function(e){
        e.preventDefault();
        const formData=Object.fromEntries(new FormData(form));
        const msg=document.getElementById('formMsg');
        const btn=document.getElementById('submitBtn');
        if(!MOBILE_RE.test(String(formData.client_mobile||'').trim())){
          msg.className='msg err';msg.innerText='❌ Please enter a valid 10-digit mobile number';return;
        }
        if(!hasBackend()){
          msg.className='msg err';msg.innerText='❌ Backend not connected.';return;
        }
        const fileInput=document.getElementById('docFiles');
        const rawFiles=fileInput?Array.from(fileInput.files||[]):[];
        if(rawFiles.length>5){msg.className='msg err';msg.innerText='❌ Maximum 5 files allowed.';return}
        if(rawFiles.find(f=>f.size>5*1024*1024)){msg.className='msg err';msg.innerText='❌ File exceeds 5 MB limit.';return}

        btn.disabled=true;btn.innerText='Reading files...';msg.className='msg';msg.innerText='Please wait...';
        let filesPayload=[];
        try{
          filesPayload=await Promise.all(rawFiles.map(async f=>{
            const dataUrl=await fileToBase64_(f);
            return {name:f.name,mimeType:f.type||'application/octet-stream',base64:dataUrl};
          }));
        }catch(err){
          btn.disabled=false;btn.innerText='Submit Application';
          msg.className='msg err';msg.innerText='❌ Could not read file(s)';return;
        }
        formData.files=filesPayload;
        btn.innerText='Submitting...';

        google.script.run
          .withSuccessHandler(function(res){
            btn.disabled=false;btn.innerText='Submit Application';
            if(res&&(res.ok||res.success)){
              renderThankYou(formData.client_name,res.leadId,res.tatDays,res.requiredDocuments||[],res.uploadedDocuments||0);
            }else{
              msg.className='msg err';msg.innerText='❌ '+(res&&(res.err||res.errorMessage)||'Submission failed');
            }
          })
          .withFailureHandler(function(err){
            btn.disabled=false;btn.innerText='Submit Application';
            msg.className='msg err';msg.innerText='❌ '+(err.message||err);
          })
          .P1_SMART_FORM_SUBMIT(formData);
      };
    }

    function forgotPin(){
      const emp=(document.getElementById('gateEmployeeCode').value||'').trim().toUpperCase(),email=window.prompt('Enter your registered company email:');if(!emp||!email)return;
      if(!hasBackend())return;
      google.script.run.withSuccessHandler(function(){const otp=window.prompt('If eligible, enter the verification code sent to your registered email:'),next=window.prompt('New PIN (6–12 digits):');if(!otp||!next)return;google.script.run.withSuccessHandler(function(v){if(!v||!v.ok){alert((v&&v.err)||'Verification failed');return;}google.script.run.withSuccessHandler(function(r){alert((r&&r.msg)||((r&&r.err)||'PIN reset failed'));}).P1_RESET_PIN(emp,v.resetToken,next);}).P1_VERIFY_OTP(emp,otp);}).withFailureHandler(()=>alert('Request could not be completed.')).P1_FORGOT_PIN(emp,email);
    }
    function changePin(){
      const emp=(document.getElementById('gateEmployeeCode').value||'').trim().toUpperCase(),current=window.prompt('Current PIN:'),next=window.prompt('New PIN (6–12 digits):');if(!emp||!current||!next||!hasBackend())return;
      google.script.run.withSuccessHandler(function(v){if(!v||!v.ok){alert((v&&v.err)||'Current PIN is invalid');return;}google.script.run.withSuccessHandler(function(r){alert((r&&r.msg)||((r&&r.err)||'PIN update failed'));}).P1_CHANGE_PIN(emp,v.accessToken,current,next);}).withFailureHandler(()=>alert('PIN update failed.')).P1_VERIFY_ACCESS(emp,current);
    }
    function verifyGate(target){
      const emp=document.getElementById('gateEmployeeCode').value.trim().toUpperCase();
      const pin=document.getElementById('gatePinCode').value.trim();
      const btn=document.getElementById('gateVerifyBtn');
      const msg=document.getElementById('gateMsg');
      if(!emp){msg.className='msg err';msg.innerText='Employee Code required';return}
      if(!hasBackend()){msg.className='msg err';msg.innerText='Backend not connected.';return}
      btn.disabled=true;msg.className='msg';msg.innerText='Verifying...';
      google.script.run
        .withSuccessHandler(function(res){
          btn.disabled=false;
          if(res&&(res.ok||res.success)){
            try{sessionStorage.setItem('p1_verified_'+emp,'yes');sessionStorage.setItem('p1_access_'+emp,res.accessToken||'')}catch(e){}
            go('?page='+target+'&emp='+encodeURIComponent(emp)+(res.accessToken?'&access_token='+encodeURIComponent(res.accessToken):''));
          }else{
            msg.className='msg err';msg.innerText='❌ '+(res&&(res.err||res.errorMessage)||'Access denied');
          }
        })
        .withFailureHandler(function(err){
          btn.disabled=false;msg.className='msg err';msg.innerText='❌ '+(err.message||err);
        })
        .P1_VERIFY_ACCESS(emp,pin);
    }

    function renderApp(){
      try{
        if(!document.getElementById('app')) return;
        if(GATED_PAGES.indexOf(PAGE)>-1 && (!isGateVerified(EMP)||(PAGE==='dashboard'&&!DASHBOARD_DATA))){
          renderAccessGate(PAGE);return;
        }
        if(PAGE==='form'||PAGE==='smart'){window.top.location.href=routeUrl('form');return;}
        else if(PAGE==='dashboard') renderDashboard();
        else if(PAGE==='card') renderCard();
        else if(PAGE==='calling'){window.top.location.href=routeUrl('calling');return;}
        else renderHome();
      }catch(err){
        document.getElementById('app').innerHTML=`<div style="padding:40px"><h2 style="color:#dc2626">Page Error</h2><p>${safe(err.message||err)}</p></div>`;
      }
    }
    renderApp();
  </script>
</body>
</html>
